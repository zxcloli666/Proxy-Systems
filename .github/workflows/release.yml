name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '!release:')
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release type
        id: release
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q '!release: major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q '!release: minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q '!release: patch'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No valid release type found"
            exit 1
          fi

      - name: Calculate version
        id: version
        env:
          RELEASE_TYPE: ${{ steps.release.outputs.type }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)

          case "$RELEASE_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name lowercase
        id: repo
        env:
          REPO: ${{ github.repository }}
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push simple-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.simple-proxy
          push: true
          cache-from: type=gha,scope=simple-proxy
          cache-to: type=gha,mode=max,scope=simple-proxy
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/simple-proxy:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/simple-proxy:latest

      - name: Build and push intermediate-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.intermediate-proxy
          push: true
          cache-from: type=gha,scope=intermediate-proxy
          cache-to: type=gha,mode=max,scope=intermediate-proxy
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/intermediate-proxy:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/intermediate-proxy:latest

      - name: Build and push tor-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tor-proxy
          push: true
          cache-from: type=gha,scope=tor-proxy
          cache-to: type=gha,mode=max,scope=tor-proxy
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/tor-proxy:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/tor-proxy:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
